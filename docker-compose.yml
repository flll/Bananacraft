# Bananacraft — localhost / 本番兼用の Compose 定義
# 使い方:
#   make mc-up      … Purpur Minecraft のみ（ゲーム :28888 / RCON :28889）
#   make mc-attach  … サーバーコンソールへ接続（デタッチ: Ctrl+P, Ctrl+Q）
#   make stack-up   … Minecraft + Bananacraft UI
# UI: http://localhost:8501

name: bananacraft

services:
  minecraft:
    image: itzg/minecraft-server:latest
    container_name: bananacraft-minecraft
    stdin_open: true
    tty: true
    ports:
      - "28888:28888"
      - "28889:28889"
    environment:
      EULA: "TRUE"
      TYPE: PURPUR
      VERSION: "26.1.2"
      MEMORY: ${MC_MEMORY:-4G}
      LEVEL_TYPE: FLAT
      ENABLE_RCON: "TRUE"
      RCON_PASSWORD: ${RCON_PASSWORD:-bananacraft}
      RCON_PORT: ${RCON_PORT:-28889}
      SERVER_PORT: "28888"
      ONLINE_MODE: ${MC_ONLINE_MODE:-FALSE}
      MAX_PLAYERS: ${MC_MAX_PLAYERS:-10}
      DIFFICULTY: ${MC_DIFFICULTY:-normal}
      MODRINTH_PROJECTS: worldedit
      MODRINTH_ALLOWED_VERSION_TYPE: release
    volumes:
      - ./minecraft-data:/data
    restart: unless-stopped
    healthcheck:
      test: mc-health
      start_period: 180s
      interval: 30s
      timeout: 10s
      retries: 5

  bananacraft:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_UID: ${DOCKER_UID:-1000}
        APP_GID: ${DOCKER_GID:-1000}
    image: bananacraft:latest
    container_name: bananacraft
    depends_on:
      minecraft:
        condition: service_healthy
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      RCON_HOST: ${RCON_HOST:-localhost}
      RCON_PORT: ${RCON_PORT:-28889}
      RCON_PASSWORD: ${RCON_PASSWORD:-bananacraft}
    volumes:
      - ./projects:/app/projects
    restart: unless-stopped
