# Bananacraft — localhost / 本番兼用の Compose 定義
# 使い方:
#   make up     … Minecraft (Purpur + WorldEdit, BlueMap 任意) + Bananacraft UI を一括起動
#   make down   … 全サービス停止
#   make logs   … サービスのログを追跡
#   make attach … Minecraft サーバーコンソールへ接続（デタッチ: Ctrl+P, Ctrl+Q）
# UI: http://localhost:8501

name: bananacraft

services:
  minecraft:
    image: itzg/minecraft-server:latest
    container_name: bananacraft-minecraft
    stdin_open: true
    tty: true
    ports:
      - "28888:28888"
      - "28889:28889"
      # BlueMap Web UI（ENABLE_BLUEMAP=true のとき有効。docker は使われないポートも bind するが衝突がないなら害は無い）
      - "${BLUEMAP_PORT:-8100}:8100"
    environment:
      EULA: "TRUE"
      TYPE: PURPUR
      VERSION: "26.1.2"
      MEMORY: ${MC_MEMORY:-4G}
      LEVEL_TYPE: FLAT
      ENABLE_RCON: "TRUE"
      RCON_PASSWORD: ${RCON_PASSWORD:-bananacraft}
      RCON_PORT: ${RCON_PORT:-28889}
      SERVER_PORT: "28888"
      ONLINE_MODE: ${MC_ONLINE_MODE:-FALSE}
      MAX_PLAYERS: ${MC_MAX_PLAYERS:-10}
      DIFFICULTY: ${MC_DIFFICULTY:-normal}
      # ENABLE_BLUEMAP=true で bluemap も Modrinth から取得される（Makefile が解決）
      MODRINTH_PROJECTS: ${MODRINTH_PROJECTS:-worldedit}
      MODRINTH_ALLOWED_VERSION_TYPE: release
    volumes:
      - ./minecraft-data:/data
    restart: unless-stopped
    healthcheck:
      test: mc-health
      start_period: 180s
      interval: 30s
      timeout: 10s
      retries: 5

  bananacraft:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_UID: ${DOCKER_UID:-1000}
        APP_GID: ${DOCKER_GID:-1000}
    image: bananacraft:latest
    container_name: bananacraft
    depends_on:
      minecraft:
        condition: service_healthy
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      # Compose 内の DNS で minecraft コンテナを名前解決する。
      # ホストから make dev で動かすときは .env の RCON_HOST=localhost を使う。
      RCON_HOST: minecraft
      RCON_PORT: ${RCON_PORT:-28889}
      RCON_PASSWORD: ${RCON_PASSWORD:-bananacraft}
      MC_HOST: minecraft
      MC_PORT: "28888"
      # WorldEdit の schematics ディレクトリを Bananacraft からも書き込めるよう共有マウントを参照する
      WORLDEDIT_SCHEM_DIR: /minecraft-data/plugins/WorldEdit/schematics
      # //paste 時に使うワールド名（itzg のデフォルト LEVEL_NAME は "world"）
      BANANACRAFT_MC_WORLD: ${BANANACRAFT_MC_WORLD:-world}
    volumes:
      - ./projects:/app/projects
      - ./minecraft-data:/minecraft-data
    restart: unless-stopped
